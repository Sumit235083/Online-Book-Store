{% load static %}

<!DOCTYPE html>
<html>

<head>
    <title>Register</title>

    <link rel="stylesheet"
          href="{% static 'accounts/css/auth.css' %}">
</head>

<body>

<div class="auth-box">

    <h2>Create Account</h2>

    <!-- ERROR MESSAGES -->
    {% if form.errors %}

        <div class="error-box">

            {% for field in form %}

                {% for error in field.errors %}
                    <p>{{ error }}</p>
                {% endfor %}

            {% endfor %}

        </div>

    {% endif %}


    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="username"
               placeholder="Enter Username"
               required>

        <input type="email"
               name="email"
               placeholder="Enter Email"
               required>

        <input type="password"
               name="password1"
               placeholder="Enter Password"
               required>

        <input type="password"
               name="password2"
               placeholder="Confirm Password"
               required>

        <button type="submit">
            Register
        </button>

    </form>

    <p>
        Already have an account ?

        <a href="/accounts/login/">
            Login
        </a>
    </p>

</div>

</body>
</html>
