{% extends 'base.html' %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'books/css/home.css' %}">

<h1 class="main-heading">Search Results</h1>

<!-- Search Form (optional but useful on this page too) -->
<div class="search-box" style="margin-bottom: 20px;">
    <form method="GET" action="{% url 'search' %}">

        <input type="text"
               name="q"
               value="{{ query }}"
               placeholder="Search books...">

        <button type="submit">Search</button>

    </form>
</div>

<hr>

<!-- Results -->
{% if books %}

<div class="book-container">

    {% for book in books %}

    <div class="book-card">

        <!-- Book Image -->
        <img src="{{ book.image.url }}" alt="{{ book.title }}">

        <!-- Book Details -->
        <h3>{{ book.title }}</h3>
        <p>{{ book.author }}</p>
        <p>{{ book.category }}</p>
        <p>₹ {{ book.price }}</p>

        <!-- Actions -->
        <a href="{% url 'book_detail' book.id %}">
            <button>View Details</button>
        </a>

    

    </div>

    {% endfor %}

</div>

{% else %}

<p>No books found for "<b>{{ query }}</b>".</p>

{% endif %}

{% endblock %}
